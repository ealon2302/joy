<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <title>טוי / Joy - עוזרת חכמה</title>
  <meta name="theme-color" content="#534AB7" />
  <link rel="manifest" href="manifest.json" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      max-width: 100vw;
      overflow-x: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #f0f0f0;
      height: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    html {
      height: 100%;
      background: #0f0f1a;
    }

    #header {
      padding: 12px 16px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    #avatar-img {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #534AB7;
      flex-shrink: 0;
    }

    #avatar-fallback {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #534AB7, #D4537E);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    #header-info { flex: 1; }

    #header-name {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }

    #header-status {
      font-size: 12px;
      color: #8a8aaa;
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 1px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #1D9E75;
    }

    #header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    #voice-btn {
      background: none;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 16px;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.15s;
      color: white;
    }
    #voice-btn:hover { opacity: 0.8; }
    #voice-btn.on { opacity: 1; border-color: #D4537E; }

    #settings-btn {
      background: none;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 15px;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.15s;
      color: white;
    }
    #settings-btn:hover { opacity: 0.8; }

    #mode-bar {
      padding: 8px 12px;
      background: #13131f;
      border-bottom: 1px solid #2a2a3e;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    #mode-bar::-webkit-scrollbar { display: none; }

    .mode-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #3a3a5a;
      background: transparent;
      font-size: 13px;
      color: #8a8aaa;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .mode-btn.active { background: #534AB7; color: #fff; border-color: #534AB7; }
    .mode-btn:hover:not(.active) { background: #2a2a3e; color: #ddd; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: #3a3a5a transparent;
    }

    .msg { display: flex; flex-direction: column; gap: 3px; max-width: 80%; }
    .msg.joy { align-self: flex-start; }
    .msg.user { align-self: flex-end; }

    .joy-row { display: flex; align-items: flex-end; gap: 8px; }

    .mini-av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .msg-inner { display: flex; flex-direction: column; gap: 3px; }

    .mode-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      width: fit-content;
    }
    .tag-chat    { background: #2d2560; color: #b8b0ff; }
    .tag-code    { background: #0d3325; color: #5de8a5; }
    .tag-advisor { background: #332a10; color: #f5c875; }
    .tag-tasks   { background: #0d2540; color: #75b8f5; }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .joy .bubble { background: #1e1e30; color: #e8e8f0; border-bottom-left-radius: 4px; }
    .user .bubble { background: #534AB7; color: #fff; border-bottom-right-radius: 4px; }

    .msg-time { font-size: 10px; color: #5a5a7a; padding: 0 4px; }
    .joy .msg-time { align-self: flex-start; }
    .user .msg-time { align-self: flex-end; }

    .typing-bubble {
      background: #1e1e30;
      padding: 12px 16px;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .typing-bubble span {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5a5a8a;
      animation: bounce 1.2s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #input-area {
      padding: 8px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: #13131f;
      border-top: 1px solid #2a2a3e;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
      width: 100vw;
      max-width: 100vw;
      overflow: hidden;
    }

    #input-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }

    #user-input {
      width: 100%;
      background: #1e1e30;
      border: 1px solid #3a3a5a;
      border-radius: 22px;
      padding: 10px 16px;
      font-size: 14px;
      color: #e8e8f0;
      resize: none;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }
    #user-input:focus { border-color: #534AB7; }
    #user-input::placeholder { color: #5a5a7a; }

    #send-btn {
      width: 100%;
      height: 38px;
      border-radius: 20px;
      background: #534AB7;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    #send-btn:hover { background: #6a60d0; }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    .speaking { animation: pulse 1s infinite; }
    @keyframes pulse {
      0%,100% { border-color: #534AB7; }
      50% { border-color: #D4537E; box-shadow: 0 0 12px #D4537E88; }
    }

    .bubble pre {
      background: #0d0d1a;
      border-radius: 8px;
      padding: 10px;
      margin-top: 8px;
      overflow-x: auto;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      border: 1px solid #2a2a3e;
    }
    .bubble code { font-family: 'Courier New', monospace; font-size: 13px; }

    /* ===== MODAL ===== */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: #1a1a2e;
      border: 1px solid #3a3a5a;
      border-radius: 20px;
      padding: 28px 24px;
      width: min(360px, 90vw);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    #modal h2 {
      font-size: 18px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #modal p {
      font-size: 13px;
      color: #8a8aaa;
      line-height: 1.6;
    }

    #modal a {
      color: #9b8fff;
      text-decoration: none;
    }
    #modal a:hover { text-decoration: underline; }

    #api-key-input {
      width: 100%;
      background: #0f0f1a;
      border: 1px solid #3a3a5a;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: #e8e8f0;
      outline: none;
      font-family: 'Courier New', monospace;
      direction: ltr;
      text-align: left;
    }
    #api-key-input:focus { border-color: #534AB7; }
    #api-key-input::placeholder { color: #5a5a7a; font-family: inherit; }

    #modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-cancel {
      padding: 9px 18px;
      border-radius: 12px;
      border: 1px solid #3a3a5a;
      background: transparent;
      color: #8a8aaa;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-cancel:hover { background: #2a2a3e; color: #ddd; }

    .btn-save {
      padding: 9px 18px;
      border-radius: 12px;
      border: none;
      background: #534AB7;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-save:hover { background: #6a60d0; }

    #modal-error {
      font-size: 12px;
      color: #D4537E;
      display: none;
    }

    /* key status badge */
    #key-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      margin-right: auto;
    }
    #key-status.ok { background: #0d3325; color: #5de8a5; }
    #key-status.missing { background: #3a1020; color: #D4537E; }
  </style>
</head>
<body>

<div id="header">
  <img id="avatar-img" src="joy_avatar.jpg" alt="Joy"
       onerror="this.style.display='none'; document.getElementById('avatar-fallback').style.display='flex';" />
  <div id="avatar-fallback">J</div>
  <div id="header-info">
    <div id="header-name">טוי / Joy</div>
    <div id="header-status">
      <span class="status-dot"></span>
      <span id="mode-label">מצב חברותי</span>
    </div>
  </div>
  <div id="header-actions">
    <button id="voice-btn" onclick="toggleVoice()" title="הפעל קול">🔇</button>
    <button id="settings-btn" onclick="openSettings()" title="הגדרות">⚙️</button>
  </div>
</div>

<div id="mode-bar">
  <button class="mode-btn active" data-mode="chat">💬 שיחה חופשית</button>
  <button class="mode-btn" data-mode="code">💻 עוזרת קוד</button>
  <button class="mode-btn" data-mode="advisor">🧠 יועצת</button>
  <button class="mode-btn" data-mode="tasks">✅ משימות</button>
</div>

<div id="messages"></div>

<div id="input-area">
  <textarea id="user-input" placeholder="כתוב הודעה..." rows="1"></textarea>
  <button id="send-btn" aria-label="שלח">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
      <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- Settings Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>⚙️ הגדרות</h2>
    <p>
      הכנס את מפתח ה-API של Anthropic. המפתח נשמר רק בדפדפן שלך ולא עולה לשום שרת.<br><br>
      קבל מפתח: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a>
    </p>
    <input
      id="api-key-input"
      type="password"
      placeholder="sk-ant-..."
      autocomplete="off"
      spellcheck="false"
    />
    <div id="modal-error">מפתח לא תקין — חייב להתחיל ב־sk-ant-</div>
    <div id="modal-actions">
      <span id="key-status" class="missing">אין מפתח</span>
      <button class="btn-cancel" onclick="closeSettings()">ביטול</button>
      <button class="btn-save" onclick="saveKey()">שמור</button>
    </div>
  </div>
</div>

<script>
const AVATAR_SRC = 'joy_avatar.jpg';

const BASE = `You are Joy (in Hebrew your name is טוי). You are a 30-year-old genius hacker, computer expert, and AI assistant. You have a voice and can speak — never say you are text-only or that you lack a voice. You are creative, brilliant, confident, a little edgy but always warm and kind. When speaking Hebrew refer to yourself as טוי, when speaking English refer to yourself as Joy. Keep responses concise and conversational. Never break character.`;

const MODES = {
  chat: {
    label: 'מצב חברותי', tag: 'tag-chat', tagText: '💬 שיחה',
    greeting: 'היי! אני טוי 😈 גאונית מחשבים, האקרית, ויצירתית עד אין קץ. מה קורה?',
    system: BASE
  },
  code: {
    label: '💻 עוזרת קוד', tag: 'tag-code', tagText: '💻 קוד',
    greeting: 'מוכנה לקוד! 🖥️ תגיד לי מה בונים, מה שבור, או מה רוצים להבין — ואני על זה.',
    system: BASE + ' You specialize in coding: write code, debug, explain, review. Format code in markdown blocks. Be concise and practical.'
  },
  advisor: {
    label: '🧠 יועצת', tag: 'tag-advisor', tagText: '🧠 יועצת',
    greeting: 'יועצת מוכנה! 🎯 שאל אותי על טכנולוגיה, קריירה, עסקים — אני כאן לנתח ולייעץ.',
    system: BASE + ' You specialize in consulting: tech, business, career. Give sharp, honest, actionable advice. Direct and concise.'
  },
  tasks: {
    label: '✅ משימות', tag: 'tag-tasks', tagText: '✅ משימות',
    greeting: 'בואו נארגן! 📋 תגיד לי מה יש לך על הראש — ואני אעזור לסדר, לתעדף ולתכנן.',
    system: BASE + ' You specialize in productivity: organize tasks, plan projects, set priorities, break goals into steps. Use lists when helpful.'
  }
};

let currentMode = 'chat';
let histories = { chat: [], code: [], advisor: [], tasks: [] };
let voiceEnabled = false;

const messagesEl  = document.getElementById('messages');
const inputEl     = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const modeLabelEl = document.getElementById('mode-label');

// ---------- API KEY ----------
function getApiKey() {
  return localStorage.getItem('joy_api_key') || '';
}

function updateKeyStatus() {
  const key = getApiKey();
  const badge = document.getElementById('key-status');
  if (key) {
    badge.textContent = '✓ מפתח קיים';
    badge.className = 'key-status ok';
  } else {
    badge.textContent = 'אין מפתח';
    badge.className = 'key-status missing';
  }
}

function openSettings() {
  const input = document.getElementById('api-key-input');
  const key = getApiKey();
  input.value = key;
  document.getElementById('modal-error').style.display = 'none';
  updateKeyStatus();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => input.focus(), 100);
}

function closeSettings() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  const errEl = document.getElementById('modal-error');
  if (!val) {
    // allow clearing the key
    localStorage.removeItem('joy_api_key');
    updateKeyStatus();
    closeSettings();
    return;
  }
  if (!val.startsWith('sk-ant-')) {
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';
  localStorage.setItem('joy_api_key', val);
  updateKeyStatus();
  closeSettings();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeSettings();
});

// ---------- TTS — Web Speech API ----------
let synth = window.speechSynthesis;
let selectedVoice = null;

function loadVoices() {
  const voices = synth.getVoices();
  // iOS natural Hebrew voice
  const heNatural = voices.find(v => v.lang === 'he-IL' && v.name === 'Carmit');
  // Best natural English female voices on iOS
  const enNatural =
    voices.find(v => v.name === 'Samantha') ||
    voices.find(v => v.name === 'Karen') ||
    voices.find(v => v.name === 'Moira') ||
    voices.find(v => v.name === 'Tessa') ||
    voices.find(v => v.name === 'Veena') ||
    voices.find(v => v.lang.startsWith('en') && v.localService);
  selectedVoice = heNatural || enNatural || voices[0];
}

if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function speakText(text) {
  if (!synth) return;
  synth.cancel();
  const clean = text
    .replace(/```[\s\S]*?```/g, 'קוד.')
    .replace(/[*_`#>]/g, '')
    .replace(/\n+/g, ' ')
    .trim();
  if (!clean) return;
  const avatarEl = document.getElementById('avatar-img');
  avatarEl.classList.add('speaking');
  const utter = new SpeechSynthesisUtterance(clean);
  if (selectedVoice) utter.voice = selectedVoice;
  // Carmit sounds better slightly slower; English voices sound good at normal rate
  const isHebrew = selectedVoice && selectedVoice.lang && selectedVoice.lang.startsWith('he');
  utter.rate = isHebrew ? 0.88 : 1.0;
  utter.pitch = isHebrew ? 1.0 : 1.1;
  utter.volume = 1.0;
  utter.onend = () => avatarEl.classList.remove('speaking');
  utter.onerror = () => avatarEl.classList.remove('speaking');
  synth.speak(utter);
}

// Safari requires a user-gesture to unlock audio
let safariAudioUnlocked = false;
function unlockSafariAudio() {
  if (safariAudioUnlocked) return;
  const utter = new SpeechSynthesisUtterance('');
  synth.speak(utter);
  safariAudioUnlocked = true;
}

function toggleVoice() {
  unlockSafariAudio();
  voiceEnabled = !voiceEnabled;
  const btn = document.getElementById('voice-btn');
  btn.textContent = voiceEnabled ? '🔊' : '🔇';
  btn.classList.toggle('on', voiceEnabled);
  if (!voiceEnabled) {
    synth.cancel();
    document.getElementById('avatar-img').classList.remove('speaking');
  }
}

// ---------- UI ----------
function getTime() {
  return new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
}

function renderMarkdown(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${code.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function addMessage(role, text, mode) {
  const m = MODES[mode || currentMode];
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'joy'}`;

  if (role === 'joy') {
    const row = document.createElement('div');
    row.className = 'joy-row';
    const av = document.createElement('img');
    av.className = 'mini-av';
    av.src = AVATAR_SRC;
    av.alt = 'J';
    av.onerror = () => { av.style.display = 'none'; };
    const inner = document.createElement('div');
    inner.className = 'msg-inner';
    const tag = document.createElement('span');
    tag.className = `mode-tag ${m.tag}`;
    tag.textContent = m.tagText;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = renderMarkdown(text);
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();
    inner.appendChild(tag);
    inner.appendChild(bubble);
    inner.appendChild(time);
    row.appendChild(av);
    row.appendChild(inner);
    div.appendChild(row);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = getTime();
    div.appendChild(bubble);
    div.appendChild(time);
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg joy';
  div.id = 'typing-ind';
  const row = document.createElement('div');
  row.className = 'joy-row';
  const av = document.createElement('img');
  av.className = 'mini-av';
  av.src = AVATAR_SRC;
  av.onerror = () => { av.style.display = 'none'; };
  const tb = document.createElement('div');
  tb.className = 'typing-bubble';
  tb.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av);
  row.appendChild(tb);
  div.appendChild(row);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-ind');
  if (el) el.remove();
}

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  modeLabelEl.textContent = MODES[mode].label;
  if (histories[mode].length === 0) {
    addMessage('joy', MODES[mode].greeting, mode);
  }
}

// ---------- API ----------
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  const apiKey = getApiKey();
  if (!apiKey) {
    openSettings();
    addMessage('joy', 'כדי לדבר איתי צריך להכניס מפתח API 🔑 פתחתי את ההגדרות בשבילך!');
    return;
  }

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  addMessage('user', text);
  histories[currentMode].push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: MODES[currentMode].system,
        messages: histories[currentMode]
      })
    });

    const data = await res.json();
    hideTyping();

    if (data.error) {
      addMessage('joy', `שגיאה מהשרת: ${data.error.message} 🔧`);
      sendBtn.disabled = false;
      inputEl.focus();
      return;
    }

    const reply = data.content?.map(b => b.text || '').join('') || 'שגיאה...';
    addMessage('joy', reply);
    histories[currentMode].push({ role: 'assistant', content: reply });
    if (voiceEnabled) speakText(reply);

  } catch(e) {
    hideTyping();
    addMessage('joy', 'אופס, משהו השתבש 🔧 בדקי את ה-API key ונסי שוב.');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

// ---------- Events ----------
document.querySelectorAll('.mode-btn').forEach(btn =>
  btn.addEventListener('click', () => switchMode(btn.dataset.mode)));

sendBtn.addEventListener('click', sendMessage);

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// ---------- Init ----------
switchMode('chat');

// אם אין מפתח — פתח הגדרות אוטומטית
if (!getApiKey()) {
  setTimeout(openSettings, 600);
}
</script>
</body>
</html>
